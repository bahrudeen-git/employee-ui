<div class="min-h-screen flex items-center justify-center bg-gray-100" [ngStyle]="{ 'background-image': 'url(/assets/employee-bg.png)', 'background-size': 'cover' }">
  <div class="w-full max-w-md bg-white rounded-lg shadow-xl overflow-hidden">
    <div class="px-6 py-4 bg-blue-600">
      <h2 class="text-white text-2xl font-semibold text-center">Login</h2>
    </div>
    <form (ngSubmit)="submit()" [formGroup]="loginForm" class="px-6 py-8">
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-1">Username</label>
        <input type="text" formControlName="username" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter your username" />
      </div>
      <div class="mb-4">
        <label class="block text-gray-700 text-sm font-medium mb-1">Password</label>
        <input type="password" formControlName="password" class="w-full p-3 border border-gray-300 rounded focus:outline-none focus:ring-2 focus:ring-blue-400" placeholder="Enter your password" />
      </div>
      <div *ngIf="errorMessage" class="text-red-500 mb-4">{{ errorMessage }}</div>
      <button type="submit" class="w-full bg-blue-600 text-white py-3 rounded hover:bg-blue-700 transition duration-150">Sign In</button>
      <p class="mt-4 text-center text-sm text-gray-600">Don't have an account? <a routerLink="/" class="text-blue-600 hover:underline">Contact Admin</a></p>
    </form>
  </div>
</div>
